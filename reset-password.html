<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu - EduTask</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Inter:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <link href="styles/index.css" rel="stylesheet" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #090D16;
        margin: 0;
        padding: 24px;
        position: relative;
        overflow-x: hidden;
      }

      /* Background glows */
      body::before, body::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.15;
        z-index: 0;
        pointer-events: none;
      }
      body::before {
        background: var(--primary);
        top: 10%;
        left: 10%;
      }
      body::after {
        background: var(--purple, #a855f7);
        bottom: 10%;
        right: 10%;
      }

      .reset-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        width: 100%;
        max-width: 440px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        z-index: 1;
        position: relative;
      }

      .reset-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .reset-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--primary), #8b5cf6);
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
      }

      .reset-title {
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .reset-subtitle {
        color: var(--text2);
        font-size: 14px;
        line-height: 1.5;
      }

      .reset-status {
        display: none;
        padding: 16px;
        border-radius: 12px;
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .reset-status.success {
        display: block;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: var(--green);
      }

      .reset-status.error {
        display: block;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: var(--red);
      }
    </style>
  </head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LWM9LH1DK0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-LWM9LH1DK0');
  </script>
  <body>
    <div class="reset-card">
      <div class="reset-header">
        <div class="reset-logo">
          <svg
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
            stroke="#ffffff"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
        </div>
        <h1 class="reset-title">Đặt lại mật khẩu</h1>
        <p class="reset-subtitle" id="reset-desc">Vui lòng nhập mật khẩu mới để khôi phục tài khoản của bạn.</p>
      </div>

      <div id="status-box" class="reset-status"></div>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">Mật khẩu mới</label>
          <div style="position: relative;">
            <input
              type="password"
              class="form-input"
              id="new-password"
              placeholder="Nhập mật khẩu mới..."
              required
              style="padding-right: 40px;"
            />
            <button type="button" onclick="togglePassword('new-password')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none;">
              <svg class="eye-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 32px;">
          <label class="form-label">Nhập lại mật khẩu mới</label>
          <div style="position: relative;">
            <input
              type="password"
              class="form-input"
              id="confirm-password"
              placeholder="Nhập lại mật khẩu mới..."
              required
              style="padding-right: 40px;"
            />
            <button type="button" onclick="togglePassword('confirm-password')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none;">
              <svg class="eye-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Xác nhận đặt lại</button>
      </form>
      
      <div style="text-align: center; margin-top: 24px;">
        <a href="index.html" style="font-size: 13px; color: var(--text2); text-decoration: none; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='var(--text2)'">Quay lại trang chủ</a>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080/api";

      // Lấy token từ URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      const statusBox = document.getElementById("status-box");
      const form = document.getElementById("reset-form");
      const submitBtn = document.getElementById("submit-btn");
      const desc = document.getElementById("reset-desc");

      if (!token) {
        showStatus("error", "Yêu cầu không hợp lệ. Vui lòng sử dụng liên kết khôi phục được gửi trong hòm thư email của bạn.");
        form.style.display = "none";
        desc.style.display = "none";
      }

      function showStatus(type, msg) {
        statusBox.className = `reset-status ${type}`;
        statusBox.innerHTML = `<strong>${type === "success" ? "Thành công!" : "Lỗi:"}</strong><br>${msg}`;
      }

      function togglePassword(id) {
        const input = document.getElementById(id);
        const button = input.nextElementSibling;
        if (input.type === "password") {
          input.type = "text";
          button.innerHTML = `
            <svg class="eye-icon" fill="none" stroke="var(--primary)" stroke-width="2" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"></path>
            </svg>
          `;
        } else {
          input.type = "password";
          button.innerHTML = `
            <svg class="eye-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
          `;
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById("new-password").value.trim();
        const confirmPassword = document.getElementById("confirm-password").value.trim();

        if (newPassword.length < 6) {
          showStatus("error", "Mật khẩu mới phải có ít nhất 6 ký tự.");
          return;
        }

        if (newPassword !== confirmPassword) {
          showStatus("error", "Mật khẩu xác nhận không khớp.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Đang xử lý...";
        statusBox.style.display = "none";

        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ token, newPassword }),
          });

          const data = await res.json().catch(() => null);

          if (!res.ok || data?.success === false) {
            throw new Error(data?.message || "Mã token hết hạn hoặc không hợp lệ. Vui lòng thử lại.");
          }

          showStatus("success", "Mật khẩu của bạn đã được đặt lại thành công! Bạn có thể quay lại trang chủ và đăng nhập ngay bây giờ.");
          form.style.display = "none";
          desc.style.display = "none";
        } catch (error) {
          showStatus("error", error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Xác nhận đặt lại";
        }
      });
    </script>
  </body>
</html>
